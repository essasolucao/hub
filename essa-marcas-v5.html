<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESSA Solução — Painel de Marcas</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0B0C0E; --surface:#13151A; --surface2:#1C1F27; --border:#252830;
  --gold:#D4AF6A; --gold2:#F0CC8A; --gold-dim:#7a6035;
  --text:#EAE6DE; --muted:#666B78; --faint:#2a2d36;
  --fee-bg:#5A9FD412; --var-bg:#A67DC812;

  --s-brifar:    #A67DC8;
  --s-andamento: #5A9FD4;
  --s-avaliacao: #D4A84B;
  --s-conquista: #5DBD8A;
  --s-declinio:  #D46060;
  --s-standby:   #888FA0;

  --alert-urgent: #D46060;
  --alert-warn:   #D4A84B;
  --alert-info:   #5A9FD4;
  --alert-none:   #888FA0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:-1px;}
.nav-logo span{color:var(--text);}
.nav-sep{width:1px;height:18px;background:var(--border);}
.nav-btn{font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:.38rem .9rem;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:'Instrument Sans',sans-serif;text-decoration:none;display:flex;align-items:center;gap:.35rem;color:var(--muted);background:transparent;border-color:var(--border);}
.nav-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
.nav-btn:hover:not(.active){color:var(--text);border-color:var(--gold-dim);}
.nav-alert-badge{background:var(--alert-urgent);color:#fff;border-radius:20px;padding:.05rem .45rem;font-size:.6rem;font-weight:700;margin-left:.2rem;}

/* ALERT BANNER */
.alert-banner{max-width:1100px;margin:1rem 1.5rem .5rem;border-radius:8px;overflow:hidden;display:none;}
.alert-banner.show{display:block;}
.alert-banner-hd{padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.alert-banner-hd h3{font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
.alert-banner-body{padding:0 1rem .8rem;}
.alert-row{display:flex;align-items:center;gap:.7rem;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:.78rem;}
.alert-row:last-child{border-bottom:none;}
.alert-icon{font-size:1rem;flex-shrink:0;}
.alert-info-text{flex:1;line-height:1.4;}
.alert-info-text strong{display:block;font-size:.82rem;}
.alert-days{font-size:.7rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}

/* YEAR FILTER */
.year-filter{max-width:1100px;margin:0 auto .5rem;padding:0 1.5rem;display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;}

/* HEADER */
header{padding:1.5rem 1.5rem .8rem;max-width:1100px;margin:0 auto;}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.header-sub{font-size:.68rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:.3rem;}
h1{font-family:'Fraunces',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1;letter-spacing:-2px;}
h1 em{font-style:italic;color:var(--gold);}
.pills{display:flex;gap:.4rem;flex-wrap:wrap;}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:.28rem .8rem;font-size:.7rem;font-weight:600;color:var(--muted);}
.pill b{color:var(--gold);font-family:'Fraunces',serif;font-size:.9rem;margin-right:.2rem;}
.divider{height:1px;background:linear-gradient(to right,var(--gold-dim),transparent);margin:1rem 0;opacity:.5;}

/* FILTERS */
.filter-bar{max-width:1100px;margin:0 auto .5rem;padding:0 1.5rem;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-right:.2rem;white-space:nowrap;}
.flt-btn{font-size:.65rem;font-weight:700;padding:.24rem .7rem;border-radius:20px;cursor:pointer;border:1px solid;transition:all .15s;background:transparent;font-family:'Instrument Sans',sans-serif;opacity:.5;}
.flt-btn.active{opacity:1;}
.esp-filter{max-width:1100px;margin:0 auto .5rem;padding:0 1.5rem;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}

/* ACTION BAR */
.action-bar{max-width:1100px;margin:0 auto 1rem;padding:0 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.btn-tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Instrument Sans',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:.38rem .8rem;border-radius:4px;cursor:pointer;transition:all .15s;}
.btn-tab:hover{border-color:var(--gold-dim);color:var(--text);} .btn-tab.active{background:var(--gold);border-color:var(--gold);color:#000;}
.btn-new{background:var(--gold);border:none;color:#000;font-family:'Instrument Sans',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.45rem 1.1rem;border-radius:4px;cursor:pointer;margin-left:auto;transition:background .15s;display:flex;align-items:center;gap:.4rem;}
.btn-new:hover{background:var(--gold2);}

/* INSIGHTS */
.insights{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:1.1rem 1.4rem;max-width:1100px;margin:0 1.5rem 1rem;}
.insights h3{font-family:'Fraunces',serif;font-size:.9rem;color:var(--gold);margin-bottom:.6rem;}
.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:.7rem;}
.ins{font-size:.75rem;line-height:1.55;color:#999;} .ins strong{color:var(--text);display:block;}

/* GRID */
.grid{max-width:1100px;margin:0 auto;padding:0 1.5rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1rem;}

/* BRAND CARD */
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;animation:fadeUp .35s ease both;cursor:pointer;position:relative;}
.bcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px #00000055;}
.bcard-top-bar{height:3px;}
.bcard-head{padding:1rem 1.2rem .6rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.brand-name{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;line-height:1.2;}
.status-badge{font-size:.6rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:.2rem .55rem;border-radius:20px;white-space:nowrap;flex-shrink:0;border:1px solid;}
.bcard-esp{padding:0 1.2rem .55rem;display:flex;flex-wrap:wrap;gap:.28rem;}
.esp-tag{font-size:.6rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;border:1px solid;}
.bcard-briefing{padding:0 1.2rem .7rem;font-size:.79rem;color:#bbb;line-height:1.5;font-style:italic;}
.bcard-briefing::before{content:'"';color:var(--gold);font-family:'Fraunces',serif;font-size:1rem;}
.bcard-briefing::after{content:'"';color:var(--gold);font-family:'Fraunces',serif;font-size:1rem;}

/* DATE + DEADLINE ROW */
.bcard-dates{padding:0 1.2rem .7rem;display:flex;gap:.5rem;flex-wrap:wrap;}
.date-chip{font-size:.65rem;font-weight:600;padding:.22rem .6rem;border-radius:5px;background:var(--surface2);color:var(--muted);display:flex;align-items:center;gap:.3rem;border:1px solid var(--border);}
.date-chip.deadline-urgent{background:#D4606018;color:var(--alert-urgent);border-color:#D4606040;}
.date-chip.deadline-warn{background:#D4A84B18;color:var(--alert-warn);border-color:#D4A84B40;}
.date-chip.deadline-ok{background:#5A9FD418;color:var(--alert-info);border-color:#5A9FD440;}
.date-chip.deadline-none{background:var(--faint);color:var(--muted);border-color:var(--border);font-style:italic;}
.date-chip.deadline-past{background:#D4606030;color:var(--alert-urgent);border-color:#D4606060;}

.bcard-meta{padding:0 1.2rem .7rem;display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.meta-box{background:var(--surface2);border-radius:5px;padding:.55rem .65rem;}
.meta-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:.15rem;}
.meta-val{font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;}
.meta-val.budget{color:var(--gold2);}
.meta-val.no-budget{color:var(--faint);font-size:.8rem;font-family:'Instrument Sans',sans-serif;font-weight:400;}
.bcard-agencies{padding:0 1.2rem .9rem;}
.agencies-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:.38rem;}
.agency-chips{display:flex;flex-wrap:wrap;gap:.28rem;}
.ag-chip{font-size:.62rem;font-weight:600;padding:.18rem .55rem;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.ag-chip.fee{border-color:#5A9FD430;color:#7DB5CC;} .ag-chip.variavel{border-color:#A67DC830;color:#C4A0E8;}
.no-agencies{font-size:.7rem;color:var(--muted);font-style:italic;}

/* ALERT PULSE on card */
.alert-pulse{position:absolute;top:.7rem;left:.7rem;width:10px;height:10px;border-radius:50%;animation:pulse 1.5s infinite;}
.alert-pulse.urgent{background:var(--alert-urgent);}
.alert-pulse.warn{background:var(--alert-warn);}
.alert-pulse.none-pulse{background:var(--alert-none);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}

/* TABLE */
.table-wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem 4rem;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
thead tr{border-bottom:2px solid var(--border);}
thead th{padding:.7rem 1rem;text-align:left;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:.75rem 1rem;vertical-align:middle;}
.td-name{font-family:'Fraunces',serif;font-weight:700;font-size:.9rem;}
.td-briefing{color:#aaa;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-budget{font-family:'Fraunces',serif;font-weight:700;color:var(--gold2);}
.td-budget.none{color:var(--muted);font-family:'Instrument Sans',sans-serif;font-weight:400;font-size:.75rem;}
.td-ags{display:flex;flex-wrap:wrap;gap:.2rem;}
.td-date{font-size:.75rem;color:var(--muted);}
.td-deadline{font-size:.73rem;font-weight:600;}

/* MODAL */
.overlay{position:fixed;inset:0;background:#000000cc;z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(5px);}
.overlay.open{display:flex;}
.det-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:94vh;display:flex;flex-direction:column;animation:modalIn .22s ease;}
.det-hd{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.det-hd h2{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;flex:1;}
.det-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.2rem .4rem;border-radius:3px;}
.det-close:hover{color:var(--text);}
.det-body{overflow-y:auto;padding:1.2rem 1.4rem;flex:1;}
.det-ft{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:space-between;align-items:center;flex-shrink:0;}

.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:.28rem;}
.inp{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.83rem;padding:.48rem .75rem;border-radius:5px;outline:none;transition:border-color .2s;width:100%;}
.inp:focus{border-color:var(--gold);}
textarea.inp{resize:vertical;min-height:65px;line-height:1.5;}
.field-2col{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.field-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;}

.status-picker{display:flex;flex-wrap:wrap;gap:.4rem;}
.st-opt{font-size:.68rem;font-weight:700;padding:.3rem .8rem;border-radius:20px;cursor:pointer;border:1px solid;transition:all .15s;font-family:'Instrument Sans',sans-serif;background:transparent;opacity:.4;}
.st-opt.sel{opacity:1;}
.esp-picker-modal{display:flex;flex-wrap:wrap;gap:.4rem;}
.esp-pick-btn{font-size:.68rem;font-weight:700;padding:.28rem .75rem;border-radius:20px;cursor:pointer;border:1px solid;transition:all .15s;font-family:'Instrument Sans',sans-serif;background:transparent;opacity:.4;}
.esp-pick-btn.sel{opacity:1;}

.ag-picker{display:flex;flex-direction:column;gap:.3rem;max-height:160px;overflow-y:auto;padding-right:.3rem;}
.ag-pick-row{display:flex;align-items:center;gap:.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.48rem .75rem;cursor:pointer;transition:border-color .15s;}
.ag-pick-row:hover{border-color:var(--gold-dim);}
.ag-pick-row.sel{border-color:var(--gold);background:#D4AF6A10;}
.ag-pick-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;transition:all .15s;}
.ag-pick-row.sel .ag-pick-check{background:var(--gold);border-color:var(--gold);color:#000;}
.ag-pick-name{font-size:.8rem;font-weight:600;flex:1;}
.ag-pick-type{font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:10px;}
.ag-pick-type.fee{background:var(--fee-bg);color:#7DB5CC;} .ag-pick-type.var{background:var(--var-bg);color:#C4A0E8;}

/* deadline hint */
.deadline-hint{font-size:.7rem;margin-top:.3rem;padding:.4rem .6rem;border-radius:5px;font-weight:600;}
.deadline-hint.urgent{background:#D4606018;color:var(--alert-urgent);}
.deadline-hint.warn{background:#D4A84B18;color:var(--alert-warn);}
.deadline-hint.ok{background:#5DBD8A18;color:var(--s-conquista);}
.deadline-hint.past{background:#D4606030;color:var(--alert-urgent);}

.btn-gold{background:var(--gold);border:none;color:#000;font-family:'Instrument Sans',sans-serif;font-size:.78rem;font-weight:700;padding:.5rem 1.2rem;border-radius:5px;cursor:pointer;transition:background .15s;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Instrument Sans',sans-serif;font-size:.78rem;font-weight:600;padding:.5rem 1rem;border-radius:5px;cursor:pointer;}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.btn-danger{background:#D4606018;border:1px solid #D4606040;color:#e07070;font-family:'Instrument Sans',sans-serif;font-size:.74rem;font-weight:600;padding:.4rem .8rem;border-radius:5px;cursor:pointer;}
.btn-danger:hover{background:#D4606030;}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;border:1px solid var(--gold-dim);color:var(--text);font-size:.8rem;font-weight:600;padding:.65rem 1.3rem;border-radius:30px;z-index:300;transition:transform .3s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

.empty{text-align:center;padding:3.5rem 2rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;display:block;}
.empty h3{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--text);margin-bottom:.5rem;}
.empty p{font-size:.82rem;line-height:1.6;max-width:300px;margin:0 auto 1.5rem;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}

@media(max-width:600px){
  header,.filter-bar,.esp-filter,.action-bar,.grid,.table-wrap,.insights,.year-filter,.alert-banner{padding-left:1rem;padding-right:1rem;}
  .insights{margin-left:1rem;margin-right:1rem;} .alert-banner{margin-left:1rem;margin-right:1rem;}
  .grid{grid-template-columns:1fr;} .field-2col,.field-3col{grid-template-columns:1fr;}
}

/* FEEDBACK */
.fb-section{margin-top:.6rem;padding:.85rem;border-radius:7px;}
.fb-section.declinio{background:#D4606008;border:1px solid #D4606030;}
.fb-section.standby{background:#888FA008;border:1px solid #888FA030;}
.fb-hd{font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.6rem;}
.fb-hd.declinio{color:var(--s-declinio);}
.fb-hd.standby{color:var(--s-standby);}
.motivo-grid{display:flex;flex-wrap:wrap;gap:.32rem;margin-bottom:.6rem;}
.motivo-btn{font-size:.67rem;font-weight:600;padding:.26rem .65rem;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.motivo-btn:hover{border-color:var(--gold-dim);color:var(--text);}
.motivo-btn.sel-d{background:#D4606018;border-color:#D4606050;color:var(--s-declinio);}
.motivo-btn.sel-s{background:#888FA018;border-color:#888FA050;color:var(--s-standby);}
.bcard-fb{margin:0 1.2rem .85rem;padding:.55rem .75rem;border-radius:6px;font-size:.72rem;line-height:1.5;}
.bcard-fb.declinio{background:#D4606010;border:1px solid #D4606030;color:#e07070;}
.bcard-fb.standby{background:#888FA010;border:1px solid #888FA030;color:#aab0be;}
.bcard-fb .fb-motivos{font-weight:700;margin-bottom:.15rem;}
.bcard-fb .fb-obs{font-style:italic;color:var(--muted);}

/* ADD INLINE */
.add-inline-row{display:flex;gap:.35rem;margin-top:.45rem;align-items:center;flex-wrap:wrap;}
.add-inline-inp{background:var(--bg);border:1px dashed var(--border);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.78rem;padding:.38rem .65rem;border-radius:5px;outline:none;transition:border-color .2s;flex:1;min-width:120px;}
.add-inline-inp:focus{border-color:var(--gold);}
.add-inline-btn{background:var(--faint);border:1px solid var(--border);color:var(--gold);font-family:'Instrument Sans',sans-serif;font-size:.72rem;font-weight:700;padding:.38rem .75rem;border-radius:5px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.add-inline-btn:hover{background:var(--gold);color:#000;}

/* ACEITE STATUS */
.ag-pick-row{position:relative;}
.ag-aceite-toggle{display:flex;gap:.25rem;margin-left:auto;flex-shrink:0;}
.aceite-btn{font-size:.58rem;font-weight:700;padding:.15rem .45rem;border-radius:20px;cursor:pointer;border:1px solid;background:transparent;font-family:'Instrument Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.aceite-btn.aceitou{color:#5DBD8A;border-color:#5DBD8A40;}
.aceite-btn.aceitou.sel{background:#5DBD8A20;border-color:#5DBD8A;}
.aceite-btn.nao{color:#D46060;border-color:#D4606040;}
.aceite-btn.nao.sel{background:#D4606020;border-color:#D46060;}

/* WINNER SELECTOR */
.winner-select-row{display:flex;flex-direction:column;gap:.35rem;margin-top:.5rem;}
.winner-ag-opt{display:flex;align-items:center;gap:.5rem;padding:.4rem .65rem;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-size:.78rem;}
.winner-ag-opt:hover{border-color:var(--gold-dim);}
.winner-ag-opt.sel{background:#D4AF6A12;border-color:var(--gold);color:var(--gold);}
.winner-ag-opt .winner-check{font-size:.85rem;flex-shrink:0;}

/* CARD display */
.bcard-aceite{padding:0 1.2rem .7rem;}
.aceite-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:.35rem;}
.aceite-chips{display:flex;flex-wrap:wrap;gap:.28rem;}
.aceite-chip{font-size:.62rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;}
.aceite-chip.sim{background:#5DBD8A15;border:1px solid #5DBD8A40;color:#5DBD8A;}
.aceite-chip.nao{background:#D4606015;border:1px solid #D4606040;color:#D46060;text-decoration:line-through;opacity:.8;}
.aceite-chip.pendente{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.bcard-winner{padding:0 1.2rem .85rem;}

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const ESPECIALIDADES = ['Assessoria de Imprensa','Eventos','Branding & Design','Full Service'];
const ESP_STYLE = {
  'Assessoria de Imprensa':{color:'#5A9FD4',border:'#5A9FD440',bg:'#5A9FD415'},
  'Eventos':               {color:'#D4A84B',border:'#D4A84B40',bg:'#D4A84B15'},
  'Branding & Design':     {color:'#e07070',border:'#D4606040',bg:'#D4606015'},
  'Full Service':          {color:'#5DBD8A',border:'#5DBD8A40',bg:'#5DBD8A15'},
};
const STATUS_LIST = ['brifar','andamento','avaliacao','conquista','declinio','standby'];
const STATUS_LBL  = {brifar:'Brifar',andamento:'Em Andamento',avaliacao:'Em Avaliação',conquista:'Conquista',declinio:'Declínio',standby:'Standby'};
const STATUS_COL  = {brifar:'var(--s-brifar)',andamento:'var(--s-andamento)',avaliacao:'var(--s-avaliacao)',conquista:'var(--s-conquista)',declinio:'var(--s-declinio)',standby:'var(--s-standby)'};
const STATUS_ICON = {brifar:'📋',andamento:'🔵',avaliacao:'🟡',conquista:'✅',declinio:'❌',standby:'⏸'};


// ═══════════════════════════════════════════════════════════
//  CONEXÃO COM GOOGLE SHEETS
//  Substitua o URL abaixo após publicar o Apps Script
// ═══════════════════════════════════════════════════════════
let API_URL = 'https://script.google.com/macros/s/AKfycbwelf8bOwvm1p6ADMQNPKGVCzBBShM-RNf1aa0Idd75JgUXRwh2Ho_5-IlU3ljjaMmYkQ/exec';

async function apiGet(action) {
  if (!API_URL) return null;
  try {
    const r = await fetch(API_URL + '?action=' + action);
    return await r.json();
  } catch(e) { console.error('API GET error:', e); return null; }
}

async function apiPost(body) {
  if (!API_URL) return null;
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(body),
    });
    return await r.json();
  } catch(e) { console.error('API POST error:', e); return null; }
}

function setApiUrl() {
  const url = prompt('Cole aqui o URL do Apps Script publicado:');
  if (url && url.startsWith('https://script.google.com')) {
    API_URL = url;
    localStorage.setItem('essa_api_url', url);
    showToast('URL salvo! Recarregando...');
    setTimeout(() => location.reload(), 1000);
  } else if (url) {
    alert('URL inválido. Deve começar com https://script.google.com');
  }
}

function showApiStatus() {
  return API_URL
    ? `<span style="color:#5DBD8A;font-size:.65rem">● Conectado ao Google Sheets</span>`
    : `<span style="color:#D46060;font-size:.65rem">● Offline (sem conexão com Sheets) <button onclick="setApiUrl()" style="background:var(--gold);border:none;color:#000;font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;cursor:pointer;margin-left:.3rem">Conectar</button></span>`;
}

const AG_KEY  = 'essa-hub-v4';
const MRC_KEY = 'essa-marcas-v1';

let agencies=[], brands=[], nextId=1;
let currentView='cards', currentSort='data';
let statusFilter=null, espFilter=null, yearFilter=null;
let editingId=null, _draft={};
let alertBannerOpen=false;

// ── DEADLINE HELPERS ─────────────────────────────────────────────────────────
function daysUntil(dateStr){
  if(!dateStr) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-today)/(1000*60*60*24));
}
function deadlineClass(days){
  if(days===null) return 'deadline-none';
  if(days<0)  return 'deadline-past';
  if(days<=0) return 'deadline-urgent';
  if(days<=4) return 'deadline-urgent';
  if(days<=7) return 'deadline-warn';
  return 'deadline-ok';
}
function deadlineLabel(days){
  if(days===null) return '📅 Sem prazo definido';
  if(days<0)  return `🔴 Prazo vencido há ${Math.abs(days)} dia(s)`;
  if(days===0) return '🚨 Prazo: HOJE!';
  if(days<=4) return `⚠️ Prazo em ${days} dia(s)`;
  if(days<=7) return `🟡 Prazo em ${days} dia(s)`;
  return `📅 Prazo em ${days} dia(s)`;
}
function needsAlert(b){
  const days=daysUntil(b.prazo);
  if(days===null) return 'none'; // sem prazo
  if(days<0)  return 'urgent';  // vencido
  if(days<=4) return 'urgent';  // ≤4 dias
  if(days<=7) return 'warn';    // ≤7 dias (buffer)
  return null;
}
function fmtDate(str){ if(!str) return '—'; const [y,m,d]=str.split('-'); return `${d}/${m}/${y}`; }
function fmtBudget(v){ if(!v||v===0) return null; if(v>=1000000) return `R$ ${(v/1000000).toFixed(1).replace('.',',')}M`; if(v>=1000) return `R$ ${(v/1000).toFixed(0)}k`; return `R$ ${v.toLocaleString('pt-BR')}`; }
function parseBudget(s){ if(!s) return 0; const n=parseFloat(s.replace(/[^\d.,]/g,'').replace(',','.')); return isNaN(n)?0:n; }

// ── PERSIST ──────────────────────────────────────────────────────────────────
async function saveBrands(){
  // Backup local
  try{ localStorage.setItem(MRC_KEY, JSON.stringify({brands,nextId})); }catch(e){}
}

async function saveBrandToSheets(data){
  try {
    const r = await apiPost({action:'saveMarca', data});
    if(r && r.ok){
      showToast('Salvo no Google Sheets ✓');
      // Reload brands from Sheets
      setTimeout(async()=>{ await loadAll(); render(); }, 1000);
    } else showToast('Erro ao salvar. Tente novamente.');
  } catch(e){ showToast('Erro ao salvar.'); }
}

async function deleteBrandFromSheets(id){
  await apiPost({action:'deleteMarca', id});
}
async function loadAll(){
  const statusEl = document.getElementById('api-status-bar');
  if(statusEl) statusEl.innerHTML = '<span style="color:#D4AF6A;font-size:.65rem">● Carregando...</span>';
  
  try {
    // Load agencies
    const agData = await apiGet('getAgencias');
    if (agData && Array.isArray(agData)) agencies = agData;

    // Load brands  
    const mrcData = await apiGet('getMarcas');
    if (mrcData && Array.isArray(mrcData)) {
      brands = mrcData;
      nextId = mrcData.length ? Math.max(...mrcData.map(b=>b.id))+1 : 1;
    } else {
      brands = [];
    }

    if(statusEl) statusEl.innerHTML = '<span style="color:#5DBD8A;font-size:.65rem">● Conectado ao Google Sheets</span>';
  } catch(e) {
    brands = [];
    agencies = [];
    if(statusEl) statusEl.innerHTML = '<span style="color:#D46060;font-size:.65rem">● Offline</span>';
  }
}
function defaultAgencies(){ return []; }

// ── FILTERING ────────────────────────────────────────────────────────────────
function filtered(){
  let list=[...brands];
  if(yearFilter) list=list.filter(b=>b.dataRecebimento&&b.dataRecebimento.startsWith(yearFilter));
  if(statusFilter) list=list.filter(b=>b.status===statusFilter);
  if(espFilter)    list=list.filter(b=>(b.especialidades||[]).includes(espFilter));
  return list;
}
function sortedList(arr){
  return [...arr].sort((a,b)=>{
    if(currentSort==='data')   return b.id-a.id;
    if(currentSort==='nome')   return a.nome.localeCompare(b.nome);
    if(currentSort==='budget') return (b.budget||0)-(a.budget||0);
    if(currentSort==='prazo'){
      const da=daysUntil(a.prazo), db=daysUntil(b.prazo);
      if(da===null&&db===null) return 0;
      if(da===null) return 1; if(db===null) return -1;
      return da-db;
    }
    return 0;
  });
}

// ── ALERTS ───────────────────────────────────────────────────────────────────
function computeAlerts(){
  const urgent=[], warn=[], noDeadline=[];
  brands.forEach(b=>{
    if(['conquista','declinio','standby'].includes(b.status)) return;
    const days=daysUntil(b.prazo);
    if(days===null){ noDeadline.push(b); return; }
    if(days<0||days<=4) urgent.push({b,days});
    else if(days<=7)    warn.push({b,days});
  });
  return {urgent,warn,noDeadline};
}

function renderAlerts(){
  const {urgent,warn,noDeadline}=computeAlerts();
  const total=urgent.length+warn.length+noDeadline.length;
  const banner=document.getElementById('alert-banner');
  const navBadge=document.getElementById('nav-alert-count');

  if(total===0){ banner.classList.remove('show'); navBadge.style.display='none'; return; }
  banner.classList.add('show');
  navBadge.style.display='inline';
  navBadge.textContent=total;

  const urgentColor='#D46060', warnColor='#D4A84B', noneColor='#888FA0';
  const titleColor = urgent.length>0 ? urgentColor : warn.length>0 ? warnColor : noneColor;
  document.getElementById('alert-banner').style.background=`${titleColor}10`;
  document.getElementById('alert-banner').style.border=`1px solid ${titleColor}30`;
  document.getElementById('alert-banner-title').style.color=titleColor;
  document.getElementById('alert-banner-title').textContent=
    urgent.length>0 ? `🚨 ${urgent.length} briefing(s) com prazo crítico!`
    : warn.length>0 ? `⚠️ ${warn.length} briefing(s) perto do prazo`
    : `📅 ${noDeadline.length} briefing(s) sem prazo definido`;

  let rows='';
  urgent.forEach(({b,days})=>{
    const lbl=days<0?`Vencido há ${Math.abs(days)} dia(s)`:days===0?'HOJE!':`${days} dia(s)`;
    rows+=`<div class="alert-row"><div class="alert-icon">🚨</div><div class="alert-info-text"><strong>${b.nome}</strong>${b.briefing?b.briefing.slice(0,60)+'…':''}</div><span class="alert-days" style="background:#D4606020;color:${urgentColor};border:1px solid #D4606040">${lbl}</span></div>`;
  });
  warn.forEach(({b,days})=>{
    rows+=`<div class="alert-row"><div class="alert-icon">⚠️</div><div class="alert-info-text"><strong>${b.nome}</strong>${b.briefing?b.briefing.slice(0,60)+'…':''}</div><span class="alert-days" style="background:#D4A84B20;color:${warnColor};border:1px solid #D4A84B40">${days} dia(s)</span></div>`;
  });
  noDeadline.forEach(b=>{
    rows+=`<div class="alert-row"><div class="alert-icon">📅</div><div class="alert-info-text"><strong>${b.nome}</strong>Sem prazo de entrega definido</div><span class="alert-days" style="background:var(--faint);color:var(--muted);border:1px solid var(--border)">Sem prazo</span></div>`;
  });
  document.getElementById('alert-banner-body').innerHTML=rows;
}

function toggleAlertBanner(){
  alertBannerOpen=!alertBannerOpen;
  document.getElementById('alert-banner-body').style.display=alertBannerOpen?'block':'none';
  document.getElementById('alert-toggle-txt').textContent=alertBannerOpen?'▴ fechar':'▾ ver detalhes';
}

// ── BROWSER NOTIFICATIONS ────────────────────────────────────────────────────
async function requestNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') await Notification.requestPermission();
}
function fireNotifications(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const {urgent,noDeadline}=computeAlerts();
  urgent.forEach(({b,days})=>{
    const title=days<0?`🚨 Prazo vencido: ${b.nome}`:`🚨 Prazo urgente: ${b.nome}`;
    const body=days<0?`Prazo venceu há ${Math.abs(days)} dia(s).`:days===0?'O prazo é HOJE!':`Faltam apenas ${days} dia(s) para o prazo.`;
    new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏷</text></svg>'});
  });
}

// ── YEAR FILTER ──────────────────────────────────────────────────────────────
function renderYearBtns(){
  const years=[...new Set(brands.filter(b=>b.dataRecebimento).map(b=>b.dataRecebimento.slice(0,4)))].sort((a,b)=>b-a);
  const curYear=new Date().getFullYear().toString();
  if(!years.includes(curYear)) years.unshift(curYear);
  document.getElementById('year-btns').innerHTML=`
    <button class="flt-btn ${yearFilter===null?'active':''}" onclick="setYearFilter(null,this)" style="color:var(--muted);border-color:var(--border)">Todos os anos</button>
    ${years.map(y=>`<button class="flt-btn ${yearFilter===y?'active':''}" onclick="setYearFilter('${y}',this)" style="color:var(--gold);border-color:${y===curYear?'var(--gold-dim)':'var(--border)'}">${y}${y===curYear?' ★':''}</button>`).join('')}
  `;
}

// ── INSIGHTS ─────────────────────────────────────────────────────────────────
function renderInsights(){
  const data = filtered();
  const total = data.length;
  const allBrands = brands; // Use all brands for yearly stats
  const anoAtual = new Date().getFullYear();

  // ── Status counts (filtered) ─────────────────────────────
  const ativos      = data.filter(b=>['andamento','avaliacao','brifar'].includes(b.status)).length;
  const conquistas  = data.filter(b=>b.status==='conquista').length;
  const declinio    = data.filter(b=>b.status==='declinio').length;
  const standby     = data.filter(b=>b.status==='standby').length;
  const andamento   = data.filter(b=>b.status==='andamento').length;
  const totalBudget = data.filter(b=>b.budget>0).reduce((s,b)=>s+b.budget,0);

  // ── Rates ────────────────────────────────────────────────
  const taxaConquista = total>0 ? (conquistas/total*100).toFixed(0) : 0;
  const taxaDeclinio  = total>0 ? (declinio/total*100).toFixed(0) : 0;
  const taxaStandby   = total>0 ? (standby/total*100).toFixed(0) : 0;
  const taxaAndamento = total>0 ? (andamento/total*100).toFixed(0) : 0;

  // ── Monthly opportunities (current year, all brands) ─────
  const byMonth = {};
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  allBrands.filter(b=>b.dataRecebimento&&b.dataRecebimento.startsWith(anoAtual)).forEach(b=>{
    const m = parseInt(b.dataRecebimento.split('-')[1])-1;
    byMonth[m] = (byMonth[m]||0)+1;
  });
  const totalAno = Object.values(byMonth).reduce((s,v)=>s+v,0);

  // ── Update top pills ─────────────────────────────────────
  document.getElementById('tp-total').textContent = total;
  document.getElementById('tp-ativos').textContent = ativos;
  document.getElementById('tp-conquistas').textContent = conquistas;
  document.getElementById('tp-budget').textContent = totalBudget>0 ? fmtBudget(totalBudget) : 'R$ 0';

  // ── Build insights grid ──────────────────────────────────
  const monthBars = meses.map((m,i)=>{
    const n = byMonth[i]||0;
    const maxV = Math.max(...Object.values(byMonth),1);
    const h = n ? Math.max(4, Math.round(n/maxV*48)) : 2;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1">
      <span style="font-size:.55rem;color:var(--muted)">${n||''}</span>
      <div style="width:100%;height:${h}px;background:${n?'var(--gold)':'var(--border)'};border-radius:2px;min-height:2px;transition:height .3s"></div>
      <span style="font-size:.55rem;color:var(--muted)">${m}</span>
    </div>`;
  }).join('');

  const insightsHTML = `
    <div class="ins-card">
      <div class="ins-label">📅 Oportunidades por mês — ${anoAtual}</div>
      <div style="display:flex;align-items:flex-end;gap:.2rem;height:70px;margin-top:.5rem">${monthBars}</div>
      <div style="font-size:.68rem;color:var(--muted);margin-top:.5rem">${totalAno} oportunidade${totalAno!==1?'s':''} geradas em ${anoAtual}</div>
    </div>
    <div class="ins-card">
      <div class="ins-label">📊 Taxas de conversão</div>
      ${rateBar('Conquistas', taxaConquista, '#5DBD8A')}
      ${rateBar('Em Andamento', taxaAndamento, '#5A9FD4')}
      ${rateBar('Declínio', taxaDeclinio, '#D46060')}
      ${rateBar('Standby', taxaStandby, '#888FA0')}
    </div>
  `;

  const el = document.getElementById('insights-content');
  if(el) el.innerHTML = insightsHTML;
}

function rateBar(label, pct, color){
  return `<div style="margin:.35rem 0">
    <div style="display:flex;justify-content:space-between;font-size:.68rem;margin-bottom:.25rem">
      <span style="color:var(--muted)">${label}</span>
      <span style="color:${color};font-weight:700">${pct}%</span>
    </div>
    <div style="background:var(--surface2);border-radius:20px;height:5px;overflow:hidden">
      <div style="width:${pct}%;background:${color};height:100%;border-radius:20px;transition:width .5s"></div>
    </div>
  </div>`;
}

function renderEspFilterBtns(){
  document.getElementById('esp-filter-btns').innerHTML=ESPECIALIDADES.map(e=>{
    const s=ESP_STYLE[e],active=espFilter===e;
    return `<button class="flt-btn ${active?'active':''}" onclick="setEspFilter('${e}',this)" style="color:${s.color};border-color:${s.border};background:${active?s.bg:'transparent'}">${e}</button>`;
  }).join('');
}

// ── TAG HTML ─────────────────────────────────────────────────────────────────
function espTagHTML(e){ const s=ESP_STYLE[e]||{color:'#999',border:'#99999940',bg:'#99999915'}; return `<span class="esp-tag" style="background:${s.bg};color:${s.color};border-color:${s.border}">${e}</span>`; }
function statusBadgeHTML(st){ const c=STATUS_COL[st]||'#999'; return `<span class="status-badge" style="color:${c};border-color:${c}40;background:${c}12">${STATUS_ICON[st]} ${STATUS_LBL[st]}</span>`; }

// ── CARDS ────────────────────────────────────────────────────────────────────
function renderCards(){
  const data=sortedList(filtered());
  const grid=document.getElementById('grid-view');
  if(!data.length){ grid.innerHTML=emptyHTML(); return; }
  grid.innerHTML=data.map((b,i)=>{
    const agList=(b.agencias||[]).map(id=>agencies.find(a=>a.id===id)).filter(Boolean);
    const sc=STATUS_COL[b.status]||'#999';
    const days=daysUntil(b.prazo);
    const dClass=deadlineClass(days);
    const dLabel=deadlineLabel(days);
    const alert=needsAlert(b);

    return `<div class="bcard" style="animation-delay:${i*.04}s" onclick="openEdit(${b.id})">
      ${alert?`<div class="alert-pulse ${alert}"></div>`:''}
      <div class="bcard-top-bar" style="background:${sc}"></div>
      <div class="bcard-head" style="padding-left:${alert?'1.8rem':'1.2rem'}">
        <div class="brand-name">${b.nome}</div>
        ${statusBadgeHTML(b.status)}
      </div>
      ${(b.especialidades||[]).length?`<div class="bcard-esp">${(b.especialidades||[]).map(espTagHTML).join('')}</div>`:''}
      ${b.briefing?`<div class="bcard-briefing">${b.briefing.length>80?b.briefing.slice(0,80)+'…':b.briefing}</div>`:''}
      <div class="bcard-dates">
        ${b.dataRecebimento?`<div class="date-chip">📥 Recebido: ${fmtDate(b.dataRecebimento)}</div>`:''}
        <div class="date-chip ${dClass}">${dLabel}</div>
      </div>
      <div class="bcard-meta">
        <div class="meta-box"><div class="meta-label">Budget</div><div class="meta-val ${!b.budget?'no-budget':'budget'}">${b.budget?fmtBudget(b.budget):'A definir'}</div></div>
        <div class="meta-box"><div class="meta-label">Agências</div><div class="meta-val">${agList.length>0?agList.length:'—'}</div></div>
      </div>
      ${aceiteChipsHTML(b)||agList.length?`<div class="bcard-agencies"><div class="agencies-label">Agências participando</div><div class="agency-chips">${agList.map(ag=>`<span class="ag-chip ${ag.type}">${ag.name}</span>`).join('')}</div></div>`:`<div class="bcard-agencies"><div class="no-agencies">Nenhuma agência selecionada</div></div>`}
      ${aceiteChipsHTML(b)}
      ${winnerCardHTML(b)}
      ${fbCardHTML(b)}

  }).join('');
}

// ── TABLE ────────────────────────────────────────────────────────────────────

    <thead><tr>
      <th>Marca</th><th>Briefing</th><th>Especialidade</th><th>Budget</th><th>Status</th><th>Recebido</th><th>Prazo</th><th>Agências</th>

      const urgentColors={urgent:'var(--alert-urgent)',warn:'var(--alert-warn)','deadline-ok':'var(--alert-info)','deadline-none':'var(--muted)','deadline-past':'var(--alert-urgent)'};
      const col=dClass==='deadline-urgent'||dClass==='deadline-past'?'var(--alert-urgent)':dClass==='deadline-warn'?'var(--alert-warn)':dClass==='deadline-ok'?'var(--alert-info)':'var(--muted)';

function emptyHTML(){ return `<div class="empty" style="grid-column:1/-1"><span class="empty-icon">🏷</span><h3>Nenhuma marca encontrada</h3><p>Adicione uma nova marca ou ajuste os filtros.</p><button class="btn-gold" onclick="openNew()">+ Nova Marca</button></div>`; }

// ── MODAL ────────────────────────────────────────────────────────────────────
function openNew(){ editingId=null; const today=new Date().toISOString().split('T')[0]; _draft={nome:'',briefing:'',especialidades:[],budget:0,status:'brifar',agencias:[],dataRecebimento:today,prazo:'',aceite:{},agenciaVencedora:null}; renderModal(); document.getElementById('overlay').classList.add('open'); document.getElementById('modal-title').textContent='+ Nova Marca'; }
function openEdit(id){ editingId=id; const b=brands.find(x=>x.id===id); if(!b) return; _draft=JSON.parse(JSON.stringify(b)); if(!_draft.aceite) _draft.aceite={}; if(!_draft.agenciaVencedora) _draft.agenciaVencedora=null; renderModal(); document.getElementById('overlay').classList.add('open'); document.getElementById('modal-title').textContent=b.nome||'Editar Marca'; }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingId=null; _draft={}; }

function deadlineHintHTML(prazo){
  if(!prazo) return '';
  const days=daysUntil(prazo);
  if(days===null) return '';
  const cls=days<0?'past':days<=4?'urgent':days<=7?'warn':'ok';
  return `<div class="deadline-hint ${cls}">${deadlineLabel(days)}</div>`;
}

// ── FEEDBACK ─────────────────────────────────────────────────────────────────
const MOTIVOS = ['Preço acima do esperado','Perfil não aderente','Cliente escolheu outra agência','Sem retorno do cliente','Falta de especialidade','Outro'];

function feedbackSectionHTML(status){
  if(!['declinio','standby'].includes(status)) return '';
  const cls = status==='declinio'?'d':'s';
  const motivos = _draft.feedback?.motivos||[];
  const obs = _draft.feedback?.obs||'';
  const icon = status==='declinio'?'❌':'⏸';
  const lbl  = status==='declinio'?'Motivo do Declínio':'Motivo do Standby';
  return `<div class="field"><div class="fb-section ${status}">
    <div class="fb-hd ${status}">${icon} ${lbl}</div>
    <div class="motivo-grid">${MOTIVOS.map(m=>{
      const sel=motivos.includes(m);
      return `<button class="motivo-btn ${sel?'sel-'+cls:''}" onclick="toggleMotivo('${m}',this,'${cls}')">${m}</button>`;
    }).join('')}</div>
    <textarea class="inp" id="f-fb-obs" placeholder="Observações adicionais (opcional)..." style="min-height:52px;font-size:.78rem">${obs}</textarea>
  </div></div>`;
}

function toggleMotivo(m,btn,cls){
  if(!_draft.feedback) _draft.feedback={motivos:[],obs:''};
  const idx=_draft.feedback.motivos.indexOf(m);
  if(idx>=0){ _draft.feedback.motivos.splice(idx,1); btn.classList.remove('sel-d','sel-s'); }
  else { _draft.feedback.motivos.push(m); btn.classList.add('sel-'+cls); }
}

function renderFeedbackArea(){
  const el=document.getElementById('feedback-area');
  if(el) el.innerHTML=feedbackSectionHTML(_draft.status);
}

function fbCardHTML(b){
  if(!['declinio','standby'].includes(b.status)||!b.feedback) return '';
  const fb=b.feedback;
  if(!fb.motivos?.length && !fb.obs) return '';
  const cls=b.status==='declinio'?'declinio':'standby';
  const icon=b.status==='declinio'?'❌':'⏸';
  return `<div class="bcard-fb ${cls}">
    ${fb.motivos?.length?`<div class="fb-motivos">${icon} ${fb.motivos.join(' · ')}</div>`:''}
    ${fb.obs?`<div class="fb-obs">"${fb.obs}"</div>`:''}
  </div>`;
}


// ── DYNAMIC ADD ───────────────────────────────────────────────────────────────
function addNewEsp(){
  const inp = document.getElementById('new-esp-inp');
  const val = (inp.value||'').trim();
  if(!val){ showToast('Digite o nome da especialidade!'); return; }
  const name = val.charAt(0).toUpperCase() + val.slice(1);
  if(ESPECIALIDADES.includes(name)){ showToast('Especialidade já existe!'); return; }
  ESPECIALIDADES.push(name);
  const palette=['#60A5FA','#F59E0B','#10B981','#EC4899','#8B5CF6','#06B6D4','#F97316','#84CC16'];
  const col = palette[ESPECIALIDADES.length % palette.length];
  ESP_STYLE[name] = {color:col, border:col+'40', bg:col+'15'};
  inp.value = '';
  refreshEspPicker();
  showToast(`"${name}" adicionada!`);
}

function refreshEspPicker(){
  const el = document.getElementById('esp-picker-modal');
  if(!el) return;
  el.innerHTML = ESPECIALIDADES.map(e=>{
    const s=ESP_STYLE[e]||{color:'#999',border:'#99999940',bg:'#99999915'};
    const sel=(_draft.especialidades||[]).includes(e);
    return `<button class="esp-pick-btn ${sel?'sel':''}" onclick="toggleDraftEsp('${e}',this)" style="color:${s.color};border-color:${s.border};background:${sel?s.bg:'transparent'}">${e}</button>`;
  }).join('');
}

function addNewAgency(){
  const nameInp = document.getElementById('new-ag-inp');
  const typeInp = document.getElementById('new-ag-type');
  const name = (nameInp.value||'').trim().toUpperCase();
  const type = typeInp.value;
  if(!name){ showToast('Digite o nome da agência!'); return; }
  if(agencies.find(a=>a.name===name)){ showToast('Agência já cadastrada!'); return; }
  const newId = agencies.length ? Math.max(...agencies.map(a=>a.id))+1 : 100;
  agencies.push({id:newId, name, type, especialidades:[], briefings:[]});
  nameInp.value='';
  refreshAgPicker();
  showToast(`${name} adicionada!`);
}

function refreshAgPicker(){
  const el = document.getElementById('ag-picker');
  if(!el) return;
  el.innerHTML = agencies.map(ag=>{
    const sel=(_draft.agencias||[]).includes(ag.id);
    const aceiteVal = (_draft.aceite||{})[ag.id];
    const aceiteRow = sel ? `<div class="ag-aceite-toggle" onclick="event.stopPropagation()">
      <button class="aceite-btn aceitou ${aceiteVal==='sim'?'sel':''}" id="aceite-sim-${ag.id}" onclick="toggleAceite(${ag.id},'sim')">✓ Aceitou</button>
      <button class="aceite-btn nao ${aceiteVal==='nao'?'sel':''}" id="aceite-nao-${ag.id}" onclick="toggleAceite(${ag.id},'nao')">✕ Não aceitou</button>
    </div>` : '';
    return `<div class="ag-pick-row ${sel?'sel':''}" style="flex-wrap:wrap;gap:.35rem;" onclick="toggleDraftAg(${ag.id},this); setTimeout(refreshAgPicker,0)">
      <div class="ag-pick-check">${sel?'✓':''}</div>
      <div class="ag-pick-name">${ag.name}</div>
      <span class="ag-pick-type ${ag.type==='fee'?'fee':'var'}">${ag.type==='fee'?'FEE':'VAR'}</span>
      ${(ag.especialidades||[]).length?`<span style="font-size:.6rem;color:var(--muted)">${ag.especialidades.join(' · ')}</span>`:''}
      ${aceiteRow}
    </div>`;
  }).join('');
}


// ── ACEITE & WINNER ───────────────────────────────────────────────────────────
function toggleAceite(agId, status){
  if(!_draft.aceite) _draft.aceite = {};
  if(_draft.aceite[agId] === status) delete _draft.aceite[agId];
  else _draft.aceite[agId] = status;
  // Update buttons visually
  const simBtn = document.getElementById('aceite-sim-'+agId);
  const naoBtn = document.getElementById('aceite-nao-'+agId);
  if(simBtn) simBtn.classList.toggle('sel', _draft.aceite[agId]==='sim');
  if(naoBtn) naoBtn.classList.toggle('sel', _draft.aceite[agId]==='nao');
}

function selectWinner(agId){
  _draft.agenciaVencedora = _draft.agenciaVencedora === agId ? null : agId;
  document.querySelectorAll('.winner-ag-opt').forEach(el=>{
    const isThis = parseInt(el.dataset.agid) === agId;
    el.classList.toggle('sel', isThis);
    el.querySelector('.winner-check').textContent = isThis ? '🏆' : '○';
  });
}

function aceiteChipsHTML(b){
  const agList = (b.agencias||[]).map(id=>agencies.find(a=>a.id===id)).filter(Boolean);
  if(!agList.length) return '';
  const aceite = b.aceite || {};
  const chips = agList.map(ag=>{
    const st = aceite[ag.id];
    const cls = st==='sim'?'sim':st==='nao'?'nao':'pendente';
    const icon = st==='sim'?'✓ ':st==='nao'?'✕ ':'';
    return `<span class="aceite-chip ${cls}">${icon}${ag.name}</span>`;
  }).join('');
  return `<div class="bcard-aceite"><div class="aceite-label">Participação das agências</div><div class="aceite-chips">${chips}</div></div>`;
}

function winnerCardHTML(b){
  if(b.status !== 'conquista') return '';
  const winId = b.agenciaVencedora;
  const ag = winId ? agencies.find(a=>a.id===winId) : null;
  if(ag){
    return `<div class="bcard-winner"><span class="winner-pill">🏆 Conquistado por: <strong>${ag.name}</strong></span></div>`;
  }
  // Conquista but no winner selected yet - prompt to select
  return `<div class="bcard-winner"><span class="winner-pill" style="opacity:.6;border-style:dashed">🏆 Conquista — clique para definir vencedora</span></div>`;
}

function winnerSectionHTML(b){
  if(b.status !== 'conquista') return '';
  const participants = (b.agencias||[]).map(id=>agencies.find(a=>a.id===id)).filter(Boolean)
    .filter(ag=>!b.aceite||b.aceite[ag.id]!=='nao'); // only those who accepted
  if(!participants.length) return '';
  return `<div class="field">
    <label>🏆 Agência Conquistadora</label>
    <div class="winner-select-row">
      ${participants.map(ag=>{
        const isSel = b.agenciaVencedora === ag.id;
        return `<div class="winner-ag-opt ${isSel?'sel':''}" data-agid="${ag.id}" onclick="selectWinner(${ag.id})">
          <span class="winner-check">${isSel?'🏆':'○'}</span>
          <span style="font-weight:600">${ag.name}</span>
          <span class="ag-pick-type ${ag.type==='fee'?'fee':'var'}" style="font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:10px">${ag.type==='fee'?'FEE':'VAR'}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function updatePrazoHint(val){ document.getElementById('prazo-hint').innerHTML=deadlineHintHTML(val); }
function setDraftStatus(s,btn){
  _draft.status=s;
  document.querySelectorAll('.st-opt').forEach(b=>{b.classList.remove('sel');b.style.background='transparent';});
  const c=STATUS_COL[s]; btn.classList.add('sel'); btn.style.background=c+'15';
  renderFeedbackArea();
}
function toggleDraftEsp(e,btn){ if(!_draft.especialidades)_draft.especialidades=[]; if(_draft.especialidades.includes(e)){_draft.especialidades=_draft.especialidades.filter(x=>x!==e);btn.classList.remove('sel');btn.style.background='transparent';}else{if(_draft.especialidades.length>=2){showToast('Máx. 2 especialidades por briefing!');return;}_draft.especialidades.push(e);btn.classList.add('sel');btn.style.background=ESP_STYLE[e].bg;} }
function toggleDraftAg(id,row){ if(!_draft.agencias)_draft.agencias=[]; if(_draft.agencias.includes(id)){_draft.agencias=_draft.agencias.filter(x=>x!==id);row.classList.remove('sel');row.querySelector('.ag-pick-check').textContent='';}else{_draft.agencias.push(id);row.classList.add('sel');row.querySelector('.ag-pick-check').textContent='✓';} }

function maskDate(inp){
  let v = inp.value.replace(/[^0-9]/g,'');
  if(v.length>2) v = v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5) v = v.slice(0,5)+'/'+v.slice(5);
  inp.value = v.slice(0,10);
}
function formatDateBR(iso){
  if(!iso) return '';
  const d = iso.split('T')[0].split('-');
  if(d.length!==3) return iso;
  return d[2]+'/'+d[1]+'/'+d[0];
}
function parseDateBR(br){
  if(!br || br.length<8) return '';
  const parts = br.split('/');
  if(parts.length!==3) return '';
  return parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
}

async function saveBrand(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){showToast('Informe o nome da marca!');return;}
  _draft.nome=nome.toUpperCase();
  _draft.briefing=document.getElementById('f-briefing').value.trim();
  _draft.budget=parseBudget(document.getElementById('f-budget').value);
  _draft.dataRecebimento=parseDateBR(document.getElementById('f-data').value)||document.getElementById('f-data').value||'';
  _draft.prazo=parseDateBR(document.getElementById('f-prazo').value)||document.getElementById('f-prazo').value||'';
  const obsEl=document.getElementById('f-fb-obs');
  if(obsEl){ if(!_draft.feedback) _draft.feedback={motivos:[],obs:''}; _draft.feedback.obs=obsEl.value.trim(); }
  if(!['declinio','standby'].includes(_draft.status)) _draft.feedback=null;
  if(editingId){const idx=brands.findIndex(b=>b.id===editingId);if(idx>=0)brands[idx]={..._draft,id:editingId};}
  else{brands.push({..._draft,id:nextId++});}
  await saveBrands();
  // Save to Google Sheets (async, non-blocking)
  const savedBrand = editingId ? brands.find(b=>b.id===editingId) : brands[brands.length-1];
  if(savedBrand){
    // Include agency names and types so Apps Script can create them if needed
    const agenciasNomes = {};
    const agenciasTipos = {};
    (savedBrand.agencias||[]).forEach(id => {
      const ag = agencies.find(a=>a.id===id);
      if(ag){ agenciasNomes[id]=ag.name; agenciasTipos[id]=ag.type; }
    });
    saveBrandToSheets({...savedBrand, agenciasNomes, agenciasTipos});
  }
  closeModal(); render();
}
async function deleteBrand(id){
  if(!confirm('Remover esta marca?'))return;
  brands=brands.filter(b=>b.id!==id);
  await saveBrands();
  deleteBrandFromSheets(id);
  closeModal();render();showToast('Marca removida.');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── INIT ─────────────────────────────────────────────────────────────────────
(async()=>{
  await loadAll();
  await requestNotifications();
  render();
  fireNotifications();
  // Re-check alerts a cada hora
  setInterval(()=>{renderAlerts();fireNotifications();},1000*60*60);
})();
</script>
